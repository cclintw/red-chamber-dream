<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>紅樓夢知識圖譜</title>
  <meta name="description" content="一個結合全文閱讀、檢索、命名實體、人物關係、共現分析與統計視覺化的《紅樓夢》數位研究平台。">
  <meta property="og:title" content="紅樓夢知識圖譜">
  <meta property="og:description" content="一個結合全文閱讀、檢索、命名實體、人物關係、共現分析與統計視覺化的《紅樓夢》數位研究平台。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cclintw.github.io/red-chamber-dream/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="紅樓夢知識圖譜">
  <meta name="twitter:description" content="一個結合全文閱讀、檢索、命名實體、人物關係、共現分析與統計視覺化的《紅樓夢》數位研究平台。">

  <script src="data/basic_entity_index.json.js"></script>
  <script src="data/ebook.json.js"></script>
  <script src="data/person_social_network.json.js"></script>
  <script src="data/search_index.json.js"></script>

  <link rel="stylesheet" href="assets/index.css">
</head>
<body class="reader-view">
<header>
  <button id="toggleReaderLeft" class="reader-toggle" title="展開/收合章節" aria-label="展開/收合章節"></button>
  <h1>紅樓夢知識圖譜</h1>
  <nav>
    <button data-view="reader" class="active">閱讀</button>
    <button data-view="search">查詢</button>
    <button data-view="network">人物關係圖</button>
    <button data-view="coGraph">共現圖</button>
    <button data-view="stats">統計</button>
  </nav>
  <button id="mobileMenuToggle" class="mobile-menu-toggle" type="button" title="展開選單" aria-label="展開選單" aria-expanded="false"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
  <div class="reader-tags" aria-label="瀏覽標記圖例">
    <button type="button" class="legend-badge" data-tag="person" data-tag-state="background"><span class="swatch tag-person"></span>人物</button>
    <button type="button" class="legend-badge" data-tag="place" data-tag-state="background"><span class="swatch tag-place"></span>地點</button>
    <button type="button" class="legend-badge" data-tag="building" data-tag-state="background"><span class="swatch tag-building"></span>建築</button>
    <button type="button" class="legend-badge" data-tag="role" data-tag-state="background"><span class="swatch tag-role"></span>身份</button>
    <button type="button" class="legend-badge" data-tag="flower" data-tag-state="background"><span class="swatch tag-flower"></span>花</button>
  </div>
  <button id="toggleReaderRight" class="reader-toggle" title="展開/收合詞頻資訊" aria-label="展開/收合詞頻資訊"></button>
</header>
<main>
  <section id="reader" class="view layout active reader-left-collapsed reader-right-collapsed">
    <aside class="side">
      <div class="panel-head"><h3 id="readerLeftTitle">章節</h3></div>
      <div id="chapterList"></div>
    </aside>
    <article class="content" id="readerContent"></article>
    <aside class="info">
      <div class="panel-head"><h3 id="readerRightTitle">詞頻資訊</h3></div>
      <div id="entityInfo" class="entity-info-default"><h3>點選標記</h3><p class="meta">點擊原文標記可查看詞頻、段落與共現。</p></div>
    </aside>
  </section>

  <section id="search" class="view">
    <article class="content">
      <div class="search-intro">
        <h2>全文檢索</h2>
      </div>
      <div class="search-row">
        <div class="search-input-wrap">
          <input id="fulltextQuery" placeholder="搜尋原文或詞頻，例如 寶玉、海棠、太虛幻境">
          <button type="button" id="clearSearch" class="search-clear" title="清除查詢" aria-label="清除查詢"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
        </div>
        <div class="search-mode" aria-label="檢索模式">
          <button type="button" data-search-mode="exact">精確字串</button>
          <button type="button" data-search-mode="entity" class="active">實體擴展</button>
        </div>
      </div>
      <div class="search-examples search-assist" aria-label="熱門查詢">
        <span class="search-examples-label">熱門查詢字串：</span>
        <button type="button" class="search-example" data-search-example="寶玉">寶玉</button>
        <button type="button" class="search-example" data-search-example="黛玉">黛玉</button>
        <button type="button" class="search-example" data-search-example="寶釵">寶釵</button>
        <button type="button" class="search-example" data-search-example="怡紅公子">怡紅公子</button>
        <button type="button" class="search-example" data-search-example="怡紅院">怡紅院</button>
        <button type="button" class="search-example" data-search-example="海棠">海棠</button>
        <button type="button" class="search-example" data-search-example="大觀園">大觀園</button>
      </div>
      <div class="search-help search-assist">
        <p>精確字串只查原文中完全出現的字串；實體擴展會依權威表與別名表擴展查詢，適合人物、地點、建築、花草等實體研究。</p>
      </div>
      <p id="activeSearchTerms" class="active-terms"></p>
      <div id="searchResults"></div>
    </article>
  </section>

  <section id="network" class="view">
    <iframe class="graph-frame" src="person_social_graph.html" title="紅樓夢人物社會網絡"></iframe>
  </section>

  <section id="coGraph" class="view">
    <iframe class="graph-frame" src="cooccurrence_graph.html" title="紅樓夢實體共現圖"></iframe>
  </section>

  <section id="stats" class="view">
    <article class="content">
      <div class="cards" id="statCards"></div>
      <h2>人物統計</h2><div id="personStats"></div>
      <h2>NER 類型統計</h2><div id="nerStats"></div>
      <h2>意象統計</h2><div id="motifStats"></div>
      <h2>章回字數 / 段落</h2><div id="chapterStats"></div>
    </article>
  </section>

  <section id="articles" class="view">
    <article class="content">
      <h2>探索：研究文章</h2>
      <div id="articleList"></div>
    </article>
  </section>
</main>
<footer class="site-footer">本站為實驗性網站，使用 Codex 協作完成。</footer>

<script>
const state = {};
let chapterNavigationToken = 0;
const $ = sel => document.querySelector(sel);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const readerIcons = {
  leftExpand: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-layout-sidebar-left-expand"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 6a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2l0 -12" /><path d="M9 4v16" /><path d="M14 10l2 2l-2 2" /></svg>',
  leftCollapse: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-layout-sidebar-left-collapse"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 6a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2l0 -12" /><path d="M9 4v16" /><path d="M15 10l-2 2l2 2" /></svg>',
  rightExpand: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-layout-sidebar-right-expand"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 6a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2l0 -12" /><path d="M15 4v16" /><path d="M10 10l-2 2l2 2" /></svg>',
  rightCollapse: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-layout-sidebar-right-collapse"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 6a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2l0 -12" /><path d="M15 4v16" /><path d="M9 10l2 2l-2 2" /></svg>'
};
async function loadJson(path) {
  if (window.DEMO_JSON && window.DEMO_JSON[path]) return window.DEMO_JSON[path];
  const r = await fetch(path);
  return r.json();
}
function paragraphPreview(text, length = 30) { return [...String(text)].slice(0, length).join(''); }
function searchPreview(text, expanded = false) {
  const chars = [...String(text)];
  return expanded || chars.length <= 100 ? chars.join('') : chars.slice(0, 100).join('');
}

async function init() {
  [state.ebook, state.search, state.entityIndex, state.network, state.stats, state.articles] = await Promise.all([
    loadJson('data/ebook.json'),
    loadJson('data/search_index.json'),
    loadJson('data/basic_entity_index.json'),
    loadJson('data/person_social_network.json'),
    loadJson('data/statistics.json'),
    loadJson('data/articles.json')
  ]);
  initNav();
  renderChapterList();
  renderChapter(state.ebook.chapters[0].id);
  initReaderPanels();
  initTagToggles();
  initSearch();
  initStats();
  initArticles();
}

function initNav() {
  document.querySelectorAll('header nav button').forEach(btn => btn.addEventListener('click', () => {
    switchView(btn.dataset.view);
    closeMobileMenu();
  }));
  $('#mobileMenuToggle').addEventListener('click', () => {
    const open = document.querySelector('header').classList.toggle('nav-open');
    $('#mobileMenuToggle').setAttribute('aria-expanded', String(open));
    $('#mobileMenuToggle').title = open ? '收合選單' : '展開選單';
    $('#mobileMenuToggle').setAttribute('aria-label', open ? '收合選單' : '展開選單');
  });
}

function switchView(viewId) {
  const wasActive = document.getElementById(viewId)?.classList.contains('active');
  document.querySelectorAll('header nav button').forEach(b => b.classList.toggle('active', b.dataset.view === viewId));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === viewId));
  document.body.classList.toggle('reader-view', viewId === 'reader');
  document.body.classList.toggle('graph-view', viewId === 'network' || viewId === 'coGraph');
  updateReaderToggleAvailability();
  if (viewId === 'stats') animateStatNumbers();
  if ((viewId === 'network' || viewId === 'coGraph') && !wasActive) reloadGraphFrame(viewId);
}

function closeMobileMenu() {
  document.querySelector('header').classList.remove('nav-open');
  $('#mobileMenuToggle').setAttribute('aria-expanded', 'false');
  $('#mobileMenuToggle').title = '展開選單';
  $('#mobileMenuToggle').setAttribute('aria-label', '展開選單');
}

function reloadGraphFrame(viewId) {
  const frame = document.querySelector(`#${viewId} iframe`);
  if (!frame) return;
  frame.src = frame.getAttribute('src');
}

function renderChapterList() {
  $('#chapterList').innerHTML = state.ebook.chapters.map(ch => `<a class="chapter-link" data-id="${ch.id}"><span class="chapter-no">第 ${ch.n} 回</span><span class="chapter-title" title="${esc(ch.title)}">${esc(ch.title)}</span></a>`).join('');
  $('#chapterList').addEventListener('click', e => {
    const a = e.target.closest('.chapter-link'); if (!a) return;
    navigateChapter(a.dataset.id, 'right');
    collapseReaderLeftOnSmallScreen();
  });
}

function renderMarkedParagraph(p) {
  let out = '', cur = 0;
  for (const ent of p.entities) {
    if (ent.start < cur) continue;
    out += esc(p.text.slice(cur, ent.start));
    const cls = ent.type === 'PERSON' ? 'person' : ['BUILDING','FAC'].includes(ent.type) ? 'building' : ['PLACE','GPE','LOC'].includes(ent.type) ? 'place' : ent.type === 'FLOWER' ? 'flower' : 'role';
    out += `<span class="entity entity-${cls}" data-key="${esc(ent.key)}">${esc(p.text.slice(ent.start, ent.end))}</span>`;
    cur = ent.end;
  }
  out += esc(p.text.slice(cur));
  return out;
}

function renderChapter(chapterId, direction = '') {
  const ch = state.ebook.chapters.find(c => c.id === chapterId);
  const idx = state.ebook.chapters.findIndex(c => c.id === chapterId);
  const prev = idx > 0 ? state.ebook.chapters[idx - 1] : null;
  const next = idx >= 0 && idx < state.ebook.chapters.length - 1 ? state.ebook.chapters[idx + 1] : null;
  const nav = `<hr class="chapter-end"><nav class="chapter-nav">${prev ? `<a href="javascript:void(0)" class="prev" data-chapter-nav="${prev.id}" data-chapter-direction="left">第 ${prev.n} 回 ${esc(prev.title)}</a>` : '<span></span>'}${next ? `<a href="javascript:void(0)" class="next" data-chapter-nav="${next.id}" data-chapter-direction="right">第 ${next.n} 回 ${esc(next.title)}</a>` : '<span></span>'}</nav>`;
  document.querySelectorAll('.chapter-link').forEach(a => a.classList.toggle('active', a.dataset.id === chapterId));
  $('#readerContent').innerHTML = `<h2>第 ${ch.n} 回 ${esc(ch.title)}</h2>` + ch.paragraphs.map(p => `<p id="${p.id}" data-paragraph-number="${p.n}">${renderMarkedParagraph(p)}</p>`).join('') + nav;
  renderChapterInfo(ch);
  animateChapter(direction);
}

function renderChapterInfo(ch) {
  const personParagraphs = [];
  const personKeys = new Set();
  let personOccurrences = 0;
  for (const p of ch.paragraphs) {
    const persons = p.entities.filter(ent => ent.type === 'PERSON');
    if (!persons.length) continue;
    personParagraphs.push(p);
    for (const ent of persons) {
      personKeys.add(ent.key);
      personOccurrences += 1;
    }
  }
  $('#entityInfo').innerHTML = `<h3>第 ${ch.n} 回 ${esc(ch.title)}</h3><p class="meta">人物 ${personKeys.size} 人 | 出現 ${personOccurrences} 次 | 段落 ${personParagraphs.length} 段</p><h4>段落</h4><ol class="entity-paragraphs">${personParagraphs.map(p => `<li><a href="#" data-jump="${ch.n}" data-pid="${p.id}">第${ch.n}回 第 #${p.n} 段</a><span class="paragraph-preview" title="${esc(paragraphPreview(p.text))}">${esc(paragraphPreview(p.text))}</span></li>`).join('')}</ol>${cooccurrenceSectionHtml(ch.paragraphs.map(p => p.id))}`;
}

function animateChapter(direction) {
  const el = $('#readerContent');
  el.classList.remove('chapter-slide-from-left', 'chapter-slide-from-right', 'chapter-transition-hidden');
  if (!direction) return;
  void el.offsetWidth;
  el.classList.add(direction === 'left' ? 'chapter-slide-from-left' : 'chapter-slide-from-right');
}

async function navigateChapter(chapterId, direction) {
  const token = ++chapterNavigationToken;
  const el = $('#readerContent');
  el.classList.remove('chapter-slide-from-left', 'chapter-slide-from-right');
  if (window.scrollY > 4) {
    el.classList.add('chapter-transition-hidden');
    jumpToTop();
    await waitForTopScroll();
  }
  if (token !== chapterNavigationToken) return;
  renderChapter(chapterId, direction);
}

function jumpToTop() {
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
}

function waitForTopScroll() {
  return new Promise(resolve => {
    const tick = () => {
      if (window.scrollY <= 4) {
        resolve();
        return;
      }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });
}

function initReaderPanels() {
  updateReaderPanelIcons();
  updateReaderToggleAvailability();
  $('#toggleReaderLeft').addEventListener('click', () => {
    $('#reader').classList.toggle('reader-left-collapsed');
    updateReaderPanelIcons();
  });
  $('#toggleReaderRight').addEventListener('click', () => {
    $('#reader').classList.toggle('reader-right-collapsed');
    updateReaderPanelIcons();
  });
}

function updateReaderPanelIcons() {
  $('#toggleReaderLeft').innerHTML = $('#reader').classList.contains('reader-left-collapsed') ? readerIcons.leftExpand : readerIcons.leftCollapse;
  $('#toggleReaderRight').innerHTML = $('#reader').classList.contains('reader-right-collapsed') ? readerIcons.rightExpand : readerIcons.rightCollapse;
}

function collapseReaderLeftOnSmallScreen() {
  if (!window.matchMedia('(max-width: 1100px)').matches) return;
  $('#reader').classList.add('reader-left-collapsed');
  updateReaderPanelIcons();
}

function updateReaderToggleAvailability() {
  const isReader = document.body.classList.contains('reader-view');
  $('#toggleReaderLeft').disabled = !isReader;
  $('#toggleReaderRight').disabled = !isReader;
}

function initTagToggles() {
  document.querySelectorAll('.legend-badge[data-tag]').forEach(btn => {
    btn.addEventListener('click', () => {
      const next = btn.dataset.tagState === 'background' ? 'underline' : btn.dataset.tagState === 'underline' ? 'off' : 'background';
      setTagState(btn.dataset.tag, next);
    });
  });
}

function setTagState(tag, mode) {
  const reader = $('#reader');
  const btn = document.querySelector(`.legend-badge[data-tag="${tag}"]`);
  reader.classList.remove(`tag-${tag}-underline`, `tag-${tag}-off`);
  if (mode !== 'background') reader.classList.add(`tag-${tag}-${mode}`);
  if (btn) {
    btn.dataset.tagState = mode;
    btn.setAttribute('aria-pressed', mode !== 'off' ? 'true' : 'false');
  }
}

function showEntity(key) {
  const item = state.entityIndex.entities[key]; if (!item) return;
  $('#reader').classList.remove('reader-right-collapsed');
  updateReaderPanelIcons();
  const paragraphs = item.paragraphs.slice(0, 80);
  $('#entityInfo').innerHTML = `<h3>${esc(item.label)}</h3><p class="meta">${esc(item.entity_type_zh)}｜出現 ${item.frequency} 次｜段落 ${item.paragraph_count} 段</p><p class="meta">表記：${esc(item.surface_forms.join('、'))}</p><h4>段落</h4><ol class="entity-paragraphs">${paragraphs.map(p => `<li><a href="#" data-jump="${p.chapter_number}" data-pid="${p.paragraph_id}">第${p.chapter_number}回 第${p.paragraph_number}段</a><span class="paragraph-preview" title="${esc(paragraphPreview(p.text))}">${esc(paragraphPreview(p.text))}</span></li>`).join('')}</ol>${cooccurrenceSectionHtml(item.paragraphs.map(p => p.paragraph_id), new Set([key]))}`;
}
document.addEventListener('click', e => {
  const ent = e.target.closest('.entity'); if (ent) showEntity(ent.dataset.key);
  const co = e.target.closest('[data-co]'); if (co) showEntity(co.dataset.co);
  const chNav = e.target.closest('[data-chapter-nav]'); if (chNav) { e.preventDefault(); navigateChapter(chNav.dataset.chapterNav, chNav.dataset.chapterDirection); }
  const jump = e.target.closest('[data-jump]'); if (jump) { e.preventDefault(); renderChapter(`hongloumeng_ch${String(jump.dataset.jump).padStart(3,'0')}`); setTimeout(() => document.getElementById(jump.dataset.pid)?.scrollIntoView({behavior:'smooth', block:'start'}), 50); }
});
function initSearch() {
  const searchState = {q: '', mode: 'entity', entityRows: [], rows: [], page: 1, pageSize: 50};
  const run = () => {
    const q = $('#fulltextQuery').value.trim();
    const mode = document.querySelector('[data-search-mode].active')?.dataset.searchMode || 'entity';
    updateSearchClear(q);
    updateSearchAssist(q);
    if (!q) { $('#activeSearchTerms').textContent = ''; $('#searchResults').innerHTML = ''; return; }
    const entityRows = mode === 'entity' ? Object.values(state.entityIndex.entities)
      .filter(item => item.label === q || item.surface_forms.some(s => s === q))
      .sort((a, b) => b.frequency - a.frequency)
      .slice(0, 30) : [];
    const rows = mergedSearchRows(q, entityRows);
    searchState.q = q;
    searchState.mode = mode;
    searchState.entityRows = entityRows;
    searchState.rows = rows;
    searchState.page = 1;
    renderSearchResults(searchState);
  };
  $('#fulltextQuery').addEventListener('input', run);
  $('#clearSearch').addEventListener('click', () => {
    $('#fulltextQuery').value = '';
    run();
    $('#fulltextQuery').focus();
  });
  document.querySelectorAll('[data-search-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-search-mode]').forEach(item => item.classList.toggle('active', item === btn));
      run();
    });
  });
  document.querySelectorAll('[data-search-example]').forEach(btn => {
    btn.addEventListener('click', () => {
      $('#fulltextQuery').value = btn.dataset.searchExample;
      run();
    });
  });
  document.addEventListener('click', e => {
    const pageButton = e.target.closest('[data-search-page]');
    if (pageButton) {
      e.preventDefault();
      const maxPage = Math.max(1, Math.ceil(searchState.rows.length / searchState.pageSize));
      searchState.page = Math.min(maxPage, Math.max(1, Number(pageButton.dataset.searchPage)));
      renderSearchResults(searchState);
      $('#searchResults').scrollIntoView({behavior: 'smooth', block: 'start'});
      return;
    }
    const entityResult = e.target.closest('[data-entity-result]');
    if (entityResult) {
      e.preventDefault();
      switchView('reader');
      showEntity(entityResult.dataset.entityResult);
      return;
    }
    const snippetAction = e.target.closest('[data-snippet-action]');
    if (snippetAction) {
      e.preventDefault();
      setAllSearchSnippets(snippetAction.dataset.snippetAction === 'expand');
      return;
    }
    const cooccurrenceToggle = e.target.closest('[data-cooccurrence-toggle]');
    if (cooccurrenceToggle) {
      e.preventDefault();
      const section = cooccurrenceToggle.closest('[data-cooccurrence-collapsible]');
      const collapsed = section.classList.toggle('is-collapsed');
      cooccurrenceToggle.setAttribute('aria-expanded', String(!collapsed));
      cooccurrenceToggle.querySelector('.search-cooccurrence-state').textContent = collapsed ? '展開' : '收合';
      return;
    }
    const toggle = e.target.closest('.snippet-toggle');
    if (toggle) {
      const snippet = toggle.closest('.snippet');
      const expanded = snippet.dataset.expanded === 'true';
      const text = expanded ? snippet.dataset.shortText : snippet.dataset.fullText;
      snippet.dataset.expanded = expanded ? 'false' : 'true';
      snippet.innerHTML = expanded
        ? `${highlightText(text, snippet.dataset.query)}...<button type="button" class="snippet-toggle">顯示全部</button>`
        : `${highlightText(text, snippet.dataset.query)} <button type="button" class="snippet-toggle">收合</button>`;
      return;
    }
    const a = e.target.closest('[data-search-jump]'); if (!a) return;
    e.preventDefault();
    switchView('reader');
    renderChapter(`hongloumeng_ch${String(a.dataset.searchJump).padStart(3,'0')}`);
    setTimeout(() => document.getElementById(a.dataset.pid)?.scrollIntoView({behavior:'smooth', block:'start'}), 50);
  });
}

function renderSearchResults(searchState) {
    const {q, mode, entityRows, rows, page, pageSize} = searchState;
    const searchTerms = mergedSearchTerms(q, entityRows);
    const summary = entityRows.length ? `<span class="entity-summary">出現 ${entityRows.reduce((sum, item) => sum + Number(item.frequency || 0), 0)} 次 | 段落 ${rows.length} 段</span>` : '';
    const modeLabel = mode === 'entity' ? '實體擴展' : '精確字串';
    $('#activeSearchTerms').innerHTML = `<span class="term-list">檢索模式：${esc(modeLabel)}　檢索字串：${formatSearchTerms(searchTerms)}</span>${summary}`;
    const entityHtml = '';
    const coHtml = searchCooccurrenceHtml(rows, entityRows);
    const paragraphHead = `<div class="search-result-head"><h3>顯示筆數</h3><div class="search-actions"><button type="button" class="tag-action" data-snippet-action="expand">全部展開</button><button type="button" class="tag-action" data-snippet-action="collapse">全部收合</button></div></div><p class="meta">共找到 <span class="search-term">${rows.length}</span> 筆</p>`;
    const totalPages = Math.max(1, Math.ceil(rows.length / pageSize));
    const start = (page - 1) * pageSize;
    const pageRows = rows.slice(start, start + pageSize);
    const pager = searchPager(page, totalPages, rows.length, start, pageRows.length);
    const paragraphHtml = paragraphHead + pager + pageRows.map(r => {
      const canToggle = [...String(r.text)].length > 100;
      const shortText = searchPreview(r.text);
      const entityNote = r.entity_forms && r.entity_forms.length ? `(${esc(r.entity_forms.join('、'))})` : '';
      return `<div class="result"><a class="result-title" href="#" data-search-jump="${r.chapter_number}" data-pid="${r.id}">第${r.chapter_number}回 第${r.paragraph_number}段${entityNote}</a><div class="snippet" data-full-text="${esc(r.text)}" data-short-text="${esc(shortText)}" data-query="${esc(q)}" data-expanded="false">${highlightText(shortText, q)}${canToggle ? `...<button type="button" class="snippet-toggle">顯示全部</button>` : ''}</div></div>`;
    }).join('') + pager;
    $('#searchResults').innerHTML = entityHtml + coHtml + paragraphHtml;
}

function searchPager(page, totalPages, totalRows, start, count) {
  if (!totalRows) return '';
  const from = start + 1;
  const to = start + count;
  return `<nav class="pager"><span>第 ${page} / ${totalPages} 頁｜${from}-${to} / ${totalRows}</span><span class="pager-controls"><button type="button" data-search-page="${page - 1}" ${page <= 1 ? 'disabled' : ''}>上一頁</button><button type="button" data-search-page="${page + 1}" ${page >= totalPages ? 'disabled' : ''}>下一頁</button></span></nav>`;
}

function highlightText(text, q) {
  return esc(text).replaceAll(esc(q), `<mark>${esc(q)}</mark>`);
}

function mergedSearchTerms(q, entityRows) {
  const terms = new Set([q]);
  entityRows.forEach(item => {
    terms.add(item.label);
    item.surface_forms.forEach(form => terms.add(form));
  });
  return [...terms].filter(Boolean);
}

function formatSearchTerms(terms) {
  return terms.map(term => `<span class="search-term">${esc(term)}</span>`).join(' <span class="operator">|</span> ');
}

function searchCooccurrenceHtml(rows, entityRows) {
  const excluded = new Set(entityRows.map(item => item.key));
  return cooccurrenceSectionHtml(rows.map(row => row.id), excluded, 'search-cooccurrence');
}

function paragraphMap() {
  if (!state.paragraphMap) {
    state.paragraphMap = new Map();
    state.ebook.chapters.forEach(ch => ch.paragraphs.forEach(p => state.paragraphMap.set(p.id, p)));
  }
  return state.paragraphMap;
}

function cooccurrenceGroup(ent) {
  if (ent.type === 'PERSON') return '人物共現';
  if (ent.type === 'TITLE_ROLE') return '身份共現';
  if (['BUILDING', 'FAC'].includes(ent.type)) return '空間／建築共現';
  if (['PLACE', 'GPE', 'LOC'].includes(ent.type)) return '地點共現';
  if (ent.type === 'FLOWER') return '花草共現';
  return '';
}

function cooccurrenceSectionHtml(paragraphIds, excludedKeys = new Set(), className = '') {
  const groups = new Map();
  const pMap = paragraphMap();
  paragraphIds.forEach(id => {
    const p = pMap.get(id);
    if (!p || !p.entities) return;
    const seenInParagraph = new Set();
    p.entities.forEach(ent => {
      const group = cooccurrenceGroup(ent);
      if (!group || excludedKeys.has(ent.key) || seenInParagraph.has(ent.key)) return;
      seenInParagraph.add(ent.key);
      if (!groups.has(group)) groups.set(group, new Map());
      const bucket = groups.get(group);
      const current = bucket.get(ent.key) || {key: ent.key, label: ent.label || ent.text || ent.key, count: 0};
      current.count += 1;
      bucket.set(ent.key, current);
    });
  });
  const order = ['人物共現', '身份共現', '空間／建築共現', '地點共現', '花草共現'];
  const html = order.map(group => {
    const items = [...(groups.get(group) || new Map()).values()]
      .sort((a, b) => b.count - a.count || a.label.localeCompare(b.label, 'zh-Hant'))
      .slice(0, 18);
    if (!items.length) return '';
    return `<div class="co-group"><h4>${group}</h4><div class="co-tags">${items.map(c => `<button data-co="${esc(c.key)}">${esc(c.label)}(${c.count})</button>`).join('')}</div></div>`;
  }).join('');
  if (className.includes('search-cooccurrence')) {
    const body = html || '<p class="meta">無可顯示共現</p>';
    return `<section class="${className} is-collapsed" data-cooccurrence-collapsible><button type="button" class="search-cooccurrence-toggle" data-cooccurrence-toggle aria-expanded="false"><span>共現分析</span><span class="search-cooccurrence-state">展開</span></button><div class="search-cooccurrence-body">${body}</div></section>`;
  }
  if (!html) return `<h4>共現</h4><p class="meta">無可顯示共現</p>`;
  return `<section class="${className}"><h3>共現</h3>${html}</section>`;
}

function mergedSearchRows(q, entityRows) {
  const byId = new Map();
  if (entityRows.length) {
    entityRows.forEach(item => {
      item.paragraphs.forEach(p => {
        const paragraphId = p.paragraph_id;
        const forms = item.surface_forms.filter(form => form && form !== q && p.text.includes(form));
        if (byId.has(paragraphId)) {
          const row = byId.get(paragraphId);
          row.entity_forms = [...new Set([...row.entity_forms, ...forms])];
          return;
        }
        byId.set(paragraphId, {
          id: paragraphId,
          chapter_number: p.chapter_number,
          paragraph_number: p.paragraph_number,
          text: p.text,
          entity_forms: p.text.includes(q) ? [] : forms.length ? forms : [item.label]
        });
      });
    });
    return [...byId.values()].sort((a, b) => Number(a.chapter_number) - Number(b.chapter_number) || Number(a.paragraph_number) - Number(b.paragraph_number));
  }
  state.search.documents.filter(d => d.text.includes(q)).forEach(d => {
    byId.set(d.id, {...d, entity_forms: []});
  });
  return [...byId.values()].sort((a, b) => Number(a.chapter_number) - Number(b.chapter_number) || Number(a.paragraph_number) - Number(b.paragraph_number));
}

function animateStatNumbers() {
  document.querySelectorAll('.stat-number').forEach(el => {
    const target = num(el.dataset.value);
    const start = performance.now();
    const duration = 850;
    const tick = now => {
      const progress = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - progress, 3);
      el.textContent = Math.round(target * eased).toLocaleString();
      if (progress < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });
}

const chartColors = ['#64748b','#2563eb','#16a34a','#db2777','#f59e0b','#7c3aed','#0891b2','#be123c','#65a30d','#9333ea'];
const entityTypeLabels = {
  PERSON:'人物', BUILDING:'建築／空間', FAC:'設施', GPE:'政區／地名', LOC:'地點', PLACE:'地點', TITLE_ROLE:'身份', FLOWER:'花草',
  CARDINAL:'數量詞', DATE:'日期', TIME:'時間', COLOR:'顏色', MOTIF:'意象', FOOD:'飲食', OBJECT:'物件', WORK_OF_ART:'作品',
  PLANT:'植物', ORG:'組織', ROOM_SPACE:'室內空間', ORDINAL:'序數', CLOTHING:'服飾', MONEY:'金錢', QUANTITY:'度量',
  NORP:'族群／身份群體', PRODUCT:'產品', EVENT:'事件', LANGUAGE:'語言', MEDICINE:'藥物', PERCENT:'百分比'
};
const subtypeLabels = {
  main_character:'主要人物', elder:'長輩', servant:'僕役', family_member:'家族成員', official:'官職人物',
  mansion:'府邸', residence:'居所', garden_space:'園林空間', temple:'寺廟', room:'房室',
  flower:'花', plant:'植物', title:'稱謂', role:'身份', kinship:'親屬稱謂'
};
const sourceLabels = {rule:'規則', 'ckip-albert-tiny':'CKIP', 'ckip-albert-tiny+rule':'CKIP＋規則', alias:'別名表'};
function num(v) { return Number(v || 0); }
function zhType(v) { return entityTypeLabels[v] || v || '未分類'; }
function zhSubtype(v) { return subtypeLabels[v] || v || '未分類'; }
function zhSource(v) { return sourceLabels[v] || String(v || '未標明').replaceAll('|', '／'); }
function sumBy(rows, keyFn, valueKey = 'count') {
  const map = new Map();
  rows.forEach(row => {
    const key = keyFn(row);
    map.set(key, (map.get(key) || 0) + num(row[valueKey]));
  });
  return [...map.entries()].map(([label, value]) => ({label, value})).sort((a, b) => b.value - a.value);
}
function barChart(rows, options = {}) {
  const max = Math.max(...rows.map(r => num(r.value)), 1);
  const total = options.total || rows.reduce((sum, r) => sum + num(r.value), 0) || 1;
  const color = options.color || '#64748b';
  return `<div class="bar-list">${rows.map(r => {
    const pct = num(r.value) / total * 100;
    return `<div class="bar-row"><span class="bar-label" title="${esc(r.label)}">${esc(r.label)}</span><span class="bar-track" title="占比 ${pct.toFixed(1)}%"><progress class="bar-progress" max="100" value="100" style="--bar-width:${pct.toFixed(1)}%;--bar-color:${softColor(r.color || color)}"></progress><span class="bar-percent">${pct.toFixed(1)}%</span></span><span class="bar-value">${num(r.value).toLocaleString()}</span></div>`;
  }).join('')}</div>`;
}
function softColor(color) {
  return color === '#b42318' ? '#f2a6a0'
    : color === '#2563eb' ? '#93c5fd'
    : color === '#16a34a' ? '#86efac'
    : color === '#db2777' ? '#f9a8d4'
    : color === '#f59e0b' ? '#fcd34d'
    : color === '#0891b2' ? '#67e8f9'
    : '#cbd5e1';
}
function donutChart(rows) {
  const total = rows.reduce((sum, r) => sum + num(r.value), 0) || 1;
  let acc = 0;
  const slices = rows.map((r, i) => {
    const start = acc / total;
    acc += num(r.value);
    const end = acc / total;
    return {...r, start, end, pct: num(r.value) / total * 100, color: r.color || chartColors[i % chartColors.length]};
  });
  const pie = `<svg class="pie-chart" viewBox="0 0 220 220" role="img" aria-label="占比圓形圖">${slices.map(slice => `<path d="${pieSlicePath(110, 110, 96, slice.start, slice.end)}" fill="${slice.color}"><title>${esc(slice.label)} ${slice.pct.toFixed(1)}%</title></path>`).join('')}${slices.filter(slice => slice.pct >= 4).map(slice => {
    const mid = (slice.start + slice.end) / 2;
    const [x, y] = polarPoint(110, 110, 58, mid);
    return `<text class="pie-label" x="${x.toFixed(1)}" y="${y.toFixed(1)}">${slice.pct.toFixed(1)}%</text>`;
  }).join('')}</svg>`;
  return `<div class="donut-wrap">${pie}${barChart(slices.map(r => ({label: r.label, value: r.value, color: softColor(r.color)})), {total})}</div>`;
}
function polarPoint(cx, cy, radius, ratio) {
  const angle = ratio * Math.PI * 2 - Math.PI / 2;
  return [cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius];
}
function pieSlicePath(cx, cy, radius, start, end) {
  const [x1, y1] = polarPoint(cx, cy, radius, start);
  const [x2, y2] = polarPoint(cx, cy, radius, end);
  const large = end - start > .5 ? 1 : 0;
  return `M${cx},${cy} L${x1.toFixed(3)},${y1.toFixed(3)} A${radius},${radius} 0 ${large} 1 ${x2.toFixed(3)},${y2.toFixed(3)} Z`;
}
function chartPanel(title, body, note = '') {
  return `<section class="chart-section"><h3>${esc(title)}</h3>${note ? `<p class="chart-note">${esc(note)}</p>` : ''}<div class="chart-panel">${body}</div></section>`;
}
function renderPersonStats(s) {

function renderChapterStats(s) {
  const rows = s.chapter_stats.map(row => ({chapter: num(row.chapter_number), chars: num(row.char_count), paragraphs: num(row.paragraph_count), title: row.title}));
  const topChars = rows.slice().sort((a, b) => b.chars - a.chars).slice(0, 10).map(row => ({label: `第${row.chapter}回`, value: row.chars}));
  const topParagraphs = rows.slice().sort((a, b) => b.paragraphs - a.paragraphs).slice(0, 10).map(row => ({label: `第${row.chapter}回`, value: row.paragraphs, color: '#0891b2'}));
  $('#chapterStats').innerHTML = `<div class="chart-grid">${chartPanel('章回字數趨勢', trendChart(rows), '紅線為字數，藍線為段落數，呈現全 120 回的篇幅變化。')}${chartPanel('字數最多章回 Top 10', barChart(topChars, {color:'#f59e0b'}))}${chartPanel('段落最多章回 Top 10', barChart(topParagraphs, {color:'#0891b2'}))}</div>`;
}
function trendChart(rows) {
  const w = 760, h = 260, pad = 34;
  const maxChars = Math.max(...rows.map(r => r.chars), 1);
  const maxPars = Math.max(...rows.map(r => r.paragraphs), 1);
  const x = i => pad + i * (w - pad * 2) / Math.max(rows.length - 1, 1);
  const yChars = v => h - pad - v / maxChars * (h - pad * 2);
  const yPars = v => h - pad - v / maxPars * (h - pad * 2);
  const path = (fn, key) => rows.map((r, i) => `${i ? 'L' : 'M'}${x(i).toFixed(1)},${fn(r[key]).toFixed(1)}`).join(' ');
  const area = `M${x(0)},${h-pad} ${rows.map((r, i) => `L${x(i).toFixed(1)},${yChars(r.chars).toFixed(1)}`).join(' ')} L${x(rows.length-1)},${h-pad} Z`;
  return `<svg class="trend-chart" viewBox="0 0 ${w} ${h}" role="img" aria-label="章回字數與段落趨勢"><path class="trend-area" d="${area}" fill="#b42318"></path><line class="trend-axis" x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}"></line><line class="trend-axis" x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}"></line><path class="trend-line" d="${path(yChars, 'chars')}" stroke="#b42318"></path><path class="trend-line" d="${path(yPars, 'paragraphs')}" stroke="#2563eb"></path><g font-size="12" fill="#64748b"><text x="${pad}" y="18">字數</text><text x="${pad+42}" y="18" fill="#2563eb">段落</text><text x="${pad}" y="${h-8}">第1回</text><text x="${w-pad-46}" y="${h-8}">第120回</text></g></svg>`;
}

let net = {nodes:[], links:[], selected:null};
function initNetwork() {
  $('#minWeight').addEventListener('input', buildNetwork);
  $('#nodeLimit').addEventListener('change', buildNetwork);
  $('#restartNetwork').addEventListener('click', buildNetwork);
  $('#networkSearch').addEventListener('input', e => {
    const q = e.target.value.trim();
    const n = net.nodes.find(x => x.name.includes(q));
    if (n) showNetworkNode(n);
  });
  $('#networkCanvas').addEventListener('click', e => {
    const rect = e.target.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const hit = net.nodes.find(n => Math.hypot(n.x - x, n.y - y) < n.r + 6);
    if (hit) showNetworkNode(hit);
  });
  buildNetwork();
  window.addEventListener('resize', drawNetwork);
}
function buildNetwork() {
  const limit = Number($('#nodeLimit').value);
  const minW = Number($('#minWeight').value);
  const topIds = new Set(state.network.nodes.slice().sort((a,b)=>b.weighted_degree-a.weighted_degree).slice(0, limit).map(n=>n.id));
  net.nodes = state.network.nodes.filter(n => topIds.has(n.id)).map((n,i)=>({...n, x:100+(i%7)*70, y:80+Math.floor(i/7)*70, vx:0, vy:0, r:5+Math.sqrt(n.frequency)/5}));
  const nodeMap = Object.fromEntries(net.nodes.map(n=>[n.id,n]));
  net.links = state.network.links.filter(l => topIds.has(l.source) && topIds.has(l.target) && l.weight >= minW).map(l => ({...l, s:nodeMap[l.source], t:nodeMap[l.target]}));
  for (let i=0;i<180;i++) tickNetwork();
  drawNetwork();
}
function tickNetwork() {
  for (const l of net.links) {
    const dx = l.t.x-l.s.x, dy = l.t.y-l.s.y, d = Math.hypot(dx,dy)||1;
    const target = Math.max(42, 170 - l.weight/3), f=(d-target)*0.004;
    l.s.vx += dx/d*f; l.s.vy += dy/d*f; l.t.vx -= dx/d*f; l.t.vy -= dy/d*f;
  }
  for (let i=0;i<net.nodes.length;i++) for (let j=i+1;j<net.nodes.length;j++) {
    const a=net.nodes[i], b=net.nodes[j], dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy)||1, f=70/(d*d);
    a.vx -= dx/d*f; a.vy -= dy/d*f; b.vx += dx/d*f; b.vy += dy/d*f;
  }
  const c = $('#networkCanvas'), w=c.clientWidth, h=c.clientHeight;
  for (const n of net.nodes) { n.vx+=(w/2-n.x)*0.0008; n.vy+=(h/2-n.y)*0.0008; n.x+=n.vx; n.y+=n.vy; n.vx*=0.88; n.vy*=0.88; }
}
function drawNetwork() {
  const c = $('#networkCanvas'), dpr = window.devicePixelRatio || 1;
  c.width = c.clientWidth*dpr; c.height = c.clientHeight*dpr;
  const ctx = c.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,c.clientWidth,c.clientHeight);
  ctx.lineCap='round';
  for (const l of net.links) { ctx.strokeStyle='rgba(120,130,150,.32)'; ctx.lineWidth=Math.max(1, Math.sqrt(l.weight)/2.5); ctx.beginPath(); ctx.moveTo(l.s.x,l.s.y); ctx.lineTo(l.t.x,l.t.y); ctx.stroke(); }
  for (const n of net.nodes) { ctx.fillStyle = n.id===net.selected ? '#b42318' : '#2563eb'; ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#111827'; ctx.font='13px sans-serif'; ctx.fillText(n.name,n.x+n.r+3,n.y+4); }
}
function showNetworkNode(n) {
  net.selected=n.id; drawNetwork();
  const links = net.links.filter(l => l.source===n.id || l.target===n.id).sort((a,b)=>b.weight-a.weight).slice(0,20);
  $('#networkInfo').innerHTML = `<h3>${esc(n.name)}</h3><p class="meta">出現 ${n.frequency} 次｜段落 ${n.paragraph_count}｜關聯 ${n.degree} 人｜加權度 ${n.weighted_degree}</p><h4>主要關係</h4><ol>${links.map(l => `<li>${esc(l.source===n.id?l.target_name:l.source_name)}：${l.weight}</li>`).join('')}</ol>`;
}
init().catch(err => { document.body.innerHTML = '<pre>'+esc(err.stack||err)+'</pre>'; });
</script>
</body>
</html>
